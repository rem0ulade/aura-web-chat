<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Desktop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">AU<span>R</span>A</div>
        <div class="logo-sub">v0.9.1 - pro</div>
        <button class="mobile-close" id="mobile-close" aria-label="Menu schliessen">X</button>
      </div>

      <nav class="sidebar-nav" aria-label="Hauptnavigation">
        <div class="nav-group">
          <div class="nav-group-title">Navigation</div>
          <button class="nav-item is-active" data-screen="chat"><span class="icon">C</span>Chat</button>
          <button class="nav-item" data-screen="history"><span class="icon">H</span>Historie</button>
          <button class="nav-item" data-screen="projects"><span class="icon">P</span>Projekte</button>
          <button class="nav-item" data-screen="newChat"><span class="icon">N</span>Neuer Chat</button>
        </div>

        <div class="nav-group">
          <div class="nav-group-title">Aura</div>
          <button class="nav-item" data-screen="personas"><span class="icon">U</span>Personas</button>
          <button class="nav-item" data-screen="memory"><span class="icon">M</span>Erinnerungen</button>
          <button class="nav-item" data-screen="skills"><span class="icon">S</span>Skills</button>
          <button class="nav-item" data-screen="agent"><span class="icon">A</span>Agent</button>
          <button class="nav-item" data-screen="parameter"><span class="icon">T</span>Parameter</button>
        </div>

        <div class="nav-group">
          <div class="nav-group-title">Einstellungen</div>
          <button class="nav-item" data-screen="apiConnectors"><span class="icon">K</span>API & Konnektoren</button>
          <button class="nav-item" data-screen="systemPrompt"><span class="icon">V</span>System Prompt</button>
          <button class="nav-item" data-screen="preferred"><span class="icon">E</span>Praeferenzen</button>
          <button class="nav-item" data-screen="general"><span class="icon">G</span>Allgemein</button>
          <button class="nav-item nav-danger" data-screen="dangerzone"><span class="icon">!</span>Gefahrenzone</button>
        </div>
      </nav>

      <footer class="sidebar-footer">
        <div class="user-pill">
          <span class="user-avatar">J</span>
          <span class="user-name">Jona - Pro User</span>
          <button class="pill-button">Account</button>
        </div>
      </footer>
    </aside>

    <div class="mobile-overlay" id="mobile-overlay"></div>

    <main class="main-panel">
      <header class="main-header">
        <div class="header-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu oeffnen">=</button>
          <div class="screen-kicker" id="screen-kicker">AURA</div>
          <h1 class="screen-title" id="screen-title">Chat</h1>
        </div>
        <div class="header-actions" id="header-actions"></div>
      </header>

      <section id="screen-root" class="screen-root" aria-live="polite"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>

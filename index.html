<!DOCTYPE html>
<html lang=de>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content=width=device-width, initial-scale=1.0>
  <title>Aura - Chat</title>
  <link rel=stylesheet href=style.css>
  <link rel=preconnect href=https://fonts.googleapis.com>
  <link rel=preconnect href=https://fonts.gstatic.com crossorigin>
  <link href=https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap rel=stylesheet>
</head>
<body>
  <div class=app-container>
    <aside class=sidebar>
      <div class=sidebar-header>
        <div class=logo>
          <span class=logo-icon>✦</span>
          <span class=logo-text>Aura</span>
        </div>
      </div>
      
      <nav class=sidebar-nav>
        <div class="nav-section">
          <div class="nav-section-title">Personas</div>
          <ul class="nav-list">
            <li class="nav-item" data-persona="developer">
              <span class="nav-icon">👨‍💻</span>
              <span class="nav-text">@developer</span>
            </li>
            <li class="nav-item" data-persona="coach">
              <span class="nav-icon">🏃</span>
              <span class="nav-text">@coach</span>
            </li>
            <li class="nav-item" data-persona="analyst">
              <span class="nav-icon">📊</span>
              <span class="nav-text">@analyst</span>
            </li>
            <li class="nav-item" data-persona="writer">
              <span class="nav-icon">✍️</span>
              <span class="nav-text">@writer</span>
            </li>
            <li class="nav-item" data-persona="designer">
              <span class="nav-icon">🎨</span>
              <span class="nav-text">@designer</span>
            </li>
          </ul>
        </div>
        
        <div class=nav-section>
          <div class=nav-section-title>Agent</div>
          <ul class=nav-list>
            <li class=nav-item agent-item>
              <span class=nav-icon>
                <span class=heartbeat-indicator></span>
              </span>
              <span class=nav-text>Heartbeat</span>
              <span class=agent-status>24/7</span>
            </li>
          </ul>
        </div>
      </nav>
      
      <div class=sidebar-footer>
        <div class=user-info>
          <div class=user-avatar>
            <span>U</span>
          </div>
          <div class=user-details>
            <span class=user-name>User</span>
            <span class=user-status>Online</span>
          </div>
        </div>
      </div>
    </aside>
    
    <main class=chat-main>
      <header class=chat-header>
        <div class=chat-title>
          <h1>Chat</h1>
          <span class=model-badge>GPT-4o</span>
        </div>
        <div class=chat-actions>
          <button class=icon-button title=Einstellungen>
            <svg width=20 height=20 viewBox=0 0 24 24 fill=none stroke=currentColor stroke-width=2>
              <circle cx=12 cy=12 r=3></circle>
              <path d=M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42></path>
            </svg>
          </button>
        </div>
      </header>
      
      <div class=chat-messages id=chat-box>
        <div class=message ai-message>
          <div class=message-avatar>
            <span>✦</span>
          </div>
          <div class=message-content>
            <div class=message-text>Hallo! Ich bin Aura. Wie kann ich dir heute helfen?</div>
            <div class=message-time>Just now</div>
          </div>
        </div>
      </div>
      
      <div class=chat-input-area>
        <div class=input-container>
          <textarea id=user-input placeholder=Schreibe deine Nachricht... rows=1></textarea>
          <button id=send-button class=send-button>
            <svg width=20 height=20 viewBox=0 0 24 24 fill=currentColor>
              <path d=M2.01 21L23 12 2.01 3 2 10l15 2-15 2z></path>
            </svg>
          </button>
        </div>
        <div class=input-hint>
          <span>Drücke Enter zum Senden, Shift+Enter für neue Zeile</span>
        </div>
      </div>
    </main>
  </div>
  
  <script src=script.js></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Branding</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #8B5CF6 0%, #A78BFA 50%, #C4B5FD 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            background: #F8F7FC;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        /* Header */
        .header {
            background: #FFFFFF;
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #E5E4F0;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #8B5CF6 0%, #A78BFA 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .avatar svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        
        .header-info h1 {
            font-size: 17px;
            font-weight: 600;
            color: #1F1B2E;
        }
        
        .header-info p {
            font-size: 13px;
            color: #8E89A4;
        }
        
        /* Messages */
        .messages {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 400px;
            background: #F8F7FC;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
        }
        
        .message.ai {
            background: #E9E5F6;
            color: #1F1B2E;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }
        
        .message.user {
            background: #8B5CF6;
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }
        
        .message-time {
            font-size: 11px;
            color: #8E89A4;
            margin-top: 4px;
        }
        
        .message.user .message-time {
            color: rgba(255,255,255,0.7);
            text-align: right;
        }
        
        /* Input */
        .input-area {
            background: #FFFFFF;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #E5E4F0;
        }
        
        .input-area input {
            flex: 1;
            background: #F5F4F8;
            border: none;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            color: #1F1B2E;
        }
        
        .input-area input::placeholder {
            color: #A7A3BC;
        }
        
        .input-area button {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .input-area button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
        
        .input-area button:hover {
            transform: scale(1.05);
        }
        
        /* Status indicator */
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #22C55E;
            border-radius: 50%;
        }
        
        .status-dot.pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <div class="header-info">
                <h1>Aura</h1>
                <div class="status">
                    <span class="status-dot"></span>
                    <p>Online</p>
                </div>
            </div>
        </div>
        
        <div class="messages">
            <div class="message ai">
                Hallo! Ich bin Aura. Wie kann ich dir helfen?
                <div class="message-time">10:16</div>
            </div>
            <div class="message user">
                Hi! Ich brauche Hilfe bei einem Projekt
                <div class="message-time">10:17</div>
            </div>
            <div class="message ai">
                Klar, gerne! Worum geht es?
                <div class="message-time">10:17</div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" placeholder="Nachricht...">
            <button>
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</body>
</html>
